run:
  output_dir: research_outputs/production
  calibration_targets_path: data/calibration_targets.csv
  population_size: 96
  calibration_candidates: 192
  proposal_scale: 0.08
  prior_mix: 0.03
  refinement_rounds: 4
  refinement_candidates: 48
  validation_replicates: 8
  n_chains: 4
  burn_in: 128
  seed: 2026
  trisomy_fraction: 0.25
  solver: stochastic_heun
  sample_strategy: stratified
  parameter_names: [alpha_EMT, alpha_DMP, k_G, k_E, k_A, threshold]
  sensitivity_parameters: [alpha_EMT, alpha_DMP, k_G, k_E, k_A]
  trace_parameters: [alpha_EMT, k_G, threshold]
